<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ByLKI Raketen-Quiz</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="katex.min.css">
    <script defer src="katex.min.js"></script>
</head>
<body>
    <!-- Startbildschirm mit Anleitung -->
    <div id="startScreen">
        <div class="info-box">
            <h1>🚀 Mission: Bruchrechnen</h1>
            <div class="instruction-text">
                <p><b>Ziel:</b> Triff die richtige Antwort-Box!</p>
                <p><b>Steuerung:</b> Nutze die Pfeiltasten <b>← →</b> oder die Buttons zum Zielen.</p>
                <p><b>Start:</b> Drücke <b>Leertaste</b>, <b>Enter</b> oder den roten Button zum Abfeuern.</p>
            </div>
            <button id="startBtn">Mission starten</button>
        </div>
    </div>

    <div id="scoreDisplay">Punkte: 0</div>
    <div id="questionDisplay">Bereitmachen...</div>

    <canvas id="gameCanvas"></canvas>
    <div id="answerContainer"></div>

    <div id="astronautFeedback">
        <div id="astronautEmoji">👩‍🚀</div>
        <div id="astronautSpeech"></div>
    </div>

    <div id="touchControls">
        <button class="touchButton" id="leftButton">←</button>
        <button class="touchButton" id="launchButton">🚀 START</button>
        <button class="touchButton" id="rightButton">→</button>
    </div>

    <script src="game.js"></script>
</body>
</html>
