<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ByLKI Raketen-Quiz</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Lokale KaTeX Dateien im Root-Ordner -->
    <link rel="stylesheet" href="katex.min.css">
    <script defer src="katex.min.js"></script>
</head>
<body>
    <div id="scoreDisplay">Punkte: 0</div>
    <div id="questionDisplay">Lade Mission...</div>

    <canvas id="gameCanvas"></canvas>
    
    <!-- Container für die flexiblen Antworten (Mathe, Bilder, Text) -->
    <div id="answerContainer"></div>

    <!-- Astronauten Feedback Sprechblase -->
    <div id="astronautFeedback">
        <div id="astronautEmoji">👩‍🚀</div>
        <div id="astronautSpeech"></div>
    </div>

    <!-- Steuerung für Touch-Geräte -->
    <div id="touchControls">
        <button class="touchButton" id="leftButton">←</button>
        <button class="touchButton" id="launchButton">🚀 START</button>
        <button class="touchButton" id="rightButton">→</button>
    </div>

    <script src="game.js"></script>
</body>
</html>
