<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ByLKI Raketen-Quiz</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="katex.min.css">
    <script defer src="katex.min.js"></script>
</head>
<body>
    <div id="startScreen">
        <div class="menu-box">
            <h1>🚀 Mathe-Rakete</h1>
            <p>Tippe die richtige Antwort an,<br>um die Rakete zu starten!</p>
            <button id="startBtn" class="main-btn">START</button>
        </div>
    </div>

    <div id="uiTopRight">
        <div id="muteToggle" class="ui-icon">🔇</div>
        <div id="infoToggle" class="ui-icon">?</div>
    </div>

    <div id="infoOverlay" class="overlay">
        <div class="info-box">
            <h2>Anleitung</h2>
            <p><b>Zielen & Feuern:</b> Tippe auf die Antwortbox oder nutze die Pfeiltasten.</p>
            <p><b>Weiter:</b> Tippe nach der Auflösung auf die Sprechblase oder drücke Enter.</p>
            <button id="closeInfoBtn">OK</button>
        </div>
    </div>

    <div id="scoreDisplay">Punkte: 0</div>

    <div id="topHUD">
        <div id="astronautFeedback" title="Tippen zum Fortfahren">
            <div id="astronautEmoji">👩‍🚀</div>
            <div id="astronautSpeech"></div>
        </div>
        <div id="questionDisplay">Bereitmachen...</div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <div id="answerContainer"></div>

    <script src="game.js"></script>
</body>
</html>
